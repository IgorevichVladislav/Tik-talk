@if (me$ | async; as me) {
  <div class="tt-profile-page__user-info">
    <tt-profile-header [profile]="me"/>

    <div class="tt-profile-page__dotted-line"></div>

    <section class="tt-profile-page__skills">
      <h2 class="tt-profile-page__title">Навыки</h2>
      <ul class="tags-list">
        @for (skill of me.stack; track skill) {
          <li class="tags-list__item">{{ skill }}</li>
        }
      </ul>
    </section>

    <section class="tt-profile-page__description">
      <h2 class="tt-profile-page__title">О себе</h2>
      <p>{{ me.description }}</p>
    </section>
  </div>

  <div class="tt-profile-page__user-form">
    <div class="tt-profile-page__firstname-and-lastname">
      <tt-input label="Имя" placeholder="Введите данные"/>
      <tt-input label="Фамилия" placeholder="Введите данные"/>
    </div>
    <tt-input label="Telegram username" placeholder="Введите данные"/>

    <label>О себе
      <textarea placeholder="Введите данные"></textarea>
    </label>
  </div>

}
