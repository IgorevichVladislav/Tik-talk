@if (profile(); as profile) {
  @if (isMePostInput()) {
    <tt-text-input
      mode="post"
      [avatarData]="profile"
      (submitted)="onCreatePost($event)"
    />
  }

  <div class="tt-post-feed__posts-wrapper">
    @for (post of posts(); track post.id) {
      <tt-post [post]="post"/>
    }
  </div>
}
